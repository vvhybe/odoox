<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <clipPath id="banner-clip">
      <rect x="0" y="0" width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="280" rx="16" fill="#0D1117"/>

  <!-- Subtle grid -->
  <g clip-path="url(#banner-clip)" opacity="0.03">
    <line x1="100" y1="0" x2="100" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="500" y1="0" x2="500" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="700" y1="0" x2="700" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="900" y1="0" x2="900" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="1000" y1="0" x2="1000" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="1100" y1="0" x2="1100" y2="280" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="0" y1="70" x2="1200" y2="70" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="0" y1="140" x2="1200" y2="140" stroke="#ffffff" stroke-width="0.6"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.6"/>
  </g>

  <!-- Right-side decorative connection diagram -->
  <!-- Node circles -->
  <circle cx="980" cy="90" r="22" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.4"/>
  <circle cx="980" cy="90" r="6" fill="#1D9E75" opacity="0.7"/>
  <circle cx="1060" cy="140" r="22" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1060" cy="140" r="6" fill="#7F77DD" opacity="0.7"/>
  <circle cx="1100" cy="80" r="16" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.25"/>
  <circle cx="1100" cy="80" r="4" fill="#1D9E75" opacity="0.5"/>
  <circle cx="920" cy="160" r="16" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.25"/>
  <circle cx="920" cy="160" r="4" fill="#7F77DD" opacity="0.5"/>
  <circle cx="1140" cy="170" r="12" fill="none" stroke="#0F6E56" stroke-width="1" opacity="0.2"/>
  <circle cx="1140" cy="170" r="3" fill="#1D9E75" opacity="0.4"/>
  <circle cx="1020" cy="200" r="12" fill="none" stroke="#3C3489" stroke-width="1" opacity="0.2"/>
  <circle cx="1020" cy="200" r="3" fill="#7F77DD" opacity="0.4"/>

  <!-- Connection lines between nodes -->
  <line x1="980" y1="90" x2="1060" y2="140" stroke="#1D9E75" stroke-width="1" opacity="0.2"/>
  <line x1="1060" y1="140" x2="1100" y2="80" stroke="#7F77DD" stroke-width="1" opacity="0.2"/>
  <line x1="980" y1="90" x2="920" y2="160" stroke="#1D9E75" stroke-width="1" opacity="0.15"/>
  <line x1="1060" y1="140" x2="1140" y2="170" stroke="#7F77DD" stroke-width="1" opacity="0.15"/>
  <line x1="1060" y1="140" x2="1020" y2="200" stroke="#534AB7" stroke-width="1" opacity="0.15"/>
  <line x1="920" y1="160" x2="1020" y2="200" stroke="#7F77DD" stroke-width="0.8" opacity="0.1"/>

  <!-- Fade-out mask for right decoration -->
  <rect x="850" y="0" width="120" height="280" fill="url(#fade-left)"/>

  <!-- Logo mark - scaled down icon -->
  <!-- Left ring — teal -->
  <circle cx="94" cy="120" r="38" fill="none" stroke="#1D9E75" stroke-width="9" opacity="0.12"/>
  <circle cx="94" cy="120" r="38" fill="none" stroke="#1D9E75" stroke-width="7.5"
    stroke-dasharray="238.8" stroke-dashoffset="59.7"
    transform="rotate(-90 94 120)"/>

  <!-- Right ring — purple -->
  <circle cx="136" cy="120" r="38" fill="none" stroke="#534AB7" stroke-width="9" opacity="0.12"/>
  <circle cx="136" cy="120" r="38" fill="none" stroke="#7F77DD" stroke-width="7.5"
    stroke-dasharray="238.8" stroke-dashoffset="59.7"
    transform="rotate(90 136 120)"/>

  <!-- Connection nodes -->
  <circle cx="115" cy="120" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="71" cy="120" r="6.5" fill="#1D9E75"/>
  <circle cx="159" cy="120" r="6.5" fill="#7F77DD"/>

  <!-- Wordmark -->
  <text x="192" y="110" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="64" font-weight="700" letter-spacing="-2" fill="#E6EDF3">odoo-sdk</text>

  <!-- Tagline -->
  <text x="193" y="150" font-family="'SF Mono', 'Fira Code', monospace"
    font-size="18" font-weight="400" fill="#8B949E" letter-spacing="0.5">
    type-safe odoo connectivity for node.js
  </text>

  <!-- Feature badges row -->
  <!-- JSON-RPC badge -->
  <rect x="193" y="178" width="98" height="28" rx="6" fill="#0F6E56" opacity="0.3"/>
  <rect x="193" y="178" width="98" height="28" rx="6" fill="none" stroke="#1D9E75" stroke-width="0.8" opacity="0.6"/>
  <text x="242" y="197" font-family="'SF Mono', monospace" font-size="11" fill="#1D9E75"
    text-anchor="middle" font-weight="500">JSON-RPC</text>

  <!-- XML-RPC badge -->
  <rect x="301" y="178" width="94" height="28" rx="6" fill="#0F6E56" opacity="0.3"/>
  <rect x="301" y="178" width="94" height="28" rx="6" fill="none" stroke="#1D9E75" stroke-width="0.8" opacity="0.6"/>
  <text x="348" y="197" font-family="'SF Mono', monospace" font-size="11" fill="#1D9E75"
    text-anchor="middle" font-weight="500">XML-RPC</text>

  <!-- TypeScript badge -->
  <rect x="405" y="178" width="100" height="28" rx="6" fill="#26215C" opacity="0.5"/>
  <rect x="405" y="178" width="100" height="28" rx="6" fill="none" stroke="#7F77DD" stroke-width="0.8" opacity="0.6"/>
  <text x="455" y="197" font-family="'SF Mono', monospace" font-size="11" fill="#AFA9EC"
    text-anchor="middle" font-weight="500">TypeScript</text>

  <!-- Zero-deps badge -->
  <rect x="515" y="178" width="104" height="28" rx="6" fill="#1a1d24" opacity="0.7"/>
  <rect x="515" y="178" width="104" height="28" rx="6" fill="none" stroke="#444441" stroke-width="0.8" opacity="0.6"/>
  <text x="567" y="197" font-family="'SF Mono', monospace" font-size="11" fill="#888780"
    text-anchor="middle" font-weight="500">zero deps</text>

  <!-- Odoo 14-19 badge -->
  <rect x="629" y="178" width="108" height="28" rx="6" fill="#1a1d24" opacity="0.7"/>
  <rect x="629" y="178" width="108" height="28" rx="6" fill="none" stroke="#444441" stroke-width="0.8" opacity="0.6"/>
  <text x="683" y="197" font-family="'SF Mono', monospace" font-size="11" fill="#888780"
    text-anchor="middle" font-weight="500">odoo 14–19</text>

  <!-- Bottom border accent -->
  <rect x="0" y="275" width="1200" height="2" rx="1" fill="none"/>
  <line x1="60" y1="276" x2="340" y2="276" stroke="#1D9E75" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="276" x2="560" y2="276" stroke="#534AB7" stroke-width="1.5" opacity="0.5"/>

  <!-- Top border subtle -->
  <rect x="0" y="0" width="1200" height="280" rx="16" fill="none" stroke="#21262D" stroke-width="1"/>
</svg>
