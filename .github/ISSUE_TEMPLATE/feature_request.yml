name: Feature Request 💡
description: Suggest an idea for Odoo-SDK
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: usage
    attributes:
      label: Proposed Usage / API Example
      description: How would the new API look? Provide a code example if possible.
      placeholder: |
        ```ts
        await odoo.newFeature('some.model', { arg: true });
        ```
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
